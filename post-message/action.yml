---
name: Post Chat Message
inputs:
  api-key:
    required: true
    description: Bearer token for the Roam API.
  chat-id:
    required: true
    description: Existing destination identifier. Legacy tagged IDs are mapped automatically into the appropriate v1 destination field.
  text:
    required: false
    description: Text message content for v1 chat.post. Mutually exclusive with blocks.
  blocks:
    required: false
    description: Raw JSON for the blocks field. The action forwards this value to v1/chat.post without parsing.
  color:
    required: false
    description: Optional block message color. Only used when blocks is provided.
runs:
  using: node24
  main: index.mjs
